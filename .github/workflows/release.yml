name: Release

# On a `vX.Y.Z` tag: publish to crates.io, create a GitHub Release from
# CHANGELOG.md, and attach pre-built binaries for each platform. Requires the
# repository secret CARGO_REGISTRY_TOKEN (a crates.io API token). See
# .claude/skills/lisplens-release-prep/SKILL.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload binary assets

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md as the release body.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release-body.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-body.md

  binaries:
    needs: publish-crate # upload to the Release created above
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lisplens
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          # Emit a `<archive>.sha256` next to each archive; the homebrew job
          # reads these to fill the formula rather than re-hashing the assets.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: binaries # the archives + their .sha256 sidecars must be uploaded first
    runs-on: ubuntu-latest
    # Update the Homebrew tap so `brew install rigortype/tap/lisplens` tracks
    # this release. Requires the repository secret HOMEBREW_TAP_TOKEN — a token
    # with contents:write on rigortype/homebrew-tap (the default GITHUB_TOKEN
    # only reaches this repo). Skips cleanly (not fails) if the secret is unset,
    # so a release still succeeds without the tap wired up.
    steps:
      - uses: actions/checkout@v5 # for .github/homebrew/lisplens.rb.tmpl
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN unset; skipping Homebrew tap update"
            exit 0
          fi
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          repo="${GITHUB_REPOSITORY}" # e.g. rigortype/lisplens
          base="https://github.com/$repo/releases/download/$tag"

          # target triple -> template placeholder for its sha256
          declare -A targets=(
            [aarch64-apple-darwin]=SHA_MACOS_ARM
            [x86_64-apple-darwin]=SHA_MACOS_INTEL
            [aarch64-unknown-linux-gnu]=SHA_LINUX_ARM
            [x86_64-unknown-linux-gnu]=SHA_LINUX_INTEL
          )

          sed_args=(-e "s|@VERSION@|$version|g" -e "s|@TAG@|$tag|g" -e "s|@BASE@|$base|g")
          for t in "${!targets[@]}"; do
            # upload-rust-binary-action names the sidecar after the archive's
            # base (no extension): lisplens-<tag>-<target>.sha256, whose one
            # line is "<hash>  lisplens-<tag>-<target>.tar.gz".
            f="lisplens-$tag-$t.sha256"
            gh release download "$tag" --repo "$repo" --pattern "$f" --dir . --clobber
            sha="$(awk '{print $1}' "$f")"
            sed_args+=(-e "s|@${targets[$t]}@|$sha|g")
          done

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/rigortype/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed "${sed_args[@]}" .github/homebrew/lisplens.rb.tmpl > tap/Formula/lisplens.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lisplens.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for $version"
          else
            git commit -m "lisplens $version"
            git push
          fi
