name: Release

# On a `vX.Y.Z` tag: publish to crates.io, create a GitHub Release from
# CHANGELOG.md, and attach pre-built binaries for each platform. Requires the
# repository secret CARGO_REGISTRY_TOKEN (a crates.io API token). See
# .claude/skills/lisplens-release-prep/SKILL.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload binary assets

jobs:
  publish-crate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md as the release body.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release-body.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-body.md

  binaries:
    needs: publish-crate # upload to the Release created above
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lisplens
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          # Emit a `<archive>.sha256` next to each archive; the homebrew job
          # reads these to fill the formula rather than re-hashing the assets.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: binaries # the archives + their .sha256 sidecars must be uploaded first
    runs-on: ubuntu-latest
    # Update the Homebrew tap so `brew install rigortype/tap/lisplens` tracks
    # this release. Requires the repository secret HOMEBREW_TAP_TOKEN — a token
    # with contents:write on rigortype/homebrew-tap (the default GITHUB_TOKEN
    # only reaches this repo). Skips cleanly (not fails) if the secret is unset,
    # so a release still succeeds without the tap wired up.
    steps:
      - uses: actions/checkout@v5 # for .github/homebrew/lisplens.rb.tmpl
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash # `declare -A` below is a bash builtin
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN unset; skipping Homebrew tap update"
            exit 0
          fi
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          repo="${GITHUB_REPOSITORY}" # e.g. rigortype/lisplens
          base="https://github.com/$repo/releases/download/$tag"

          # target triple -> template placeholder for its sha256
          declare -A targets=(
            [aarch64-apple-darwin]=SHA_MACOS_ARM
            [x86_64-apple-darwin]=SHA_MACOS_INTEL
            [aarch64-unknown-linux-gnu]=SHA_LINUX_ARM
            [x86_64-unknown-linux-gnu]=SHA_LINUX_INTEL
          )

          sed_args=(-e "s|@VERSION@|$version|g" -e "s|@TAG@|$tag|g" -e "s|@BASE@|$base|g")
          for t in "${!targets[@]}"; do
            # upload-rust-binary-action writes the sidecar as "<archive>.<algo>"
            # where <archive> is the EXTENSIONLESS base (the action documents its
            # `archive` output as "Archive base name"); the extension is appended
            # only to the asset itself. It runs, in effect,
            # `shasum -a 256 "$base.tar.gz" > "$base.sha256"` — so the two names
            # differ, and it is easy to reach for the wrong one: the FILE is
            # lisplens-<tag>-<target>.sha256, while the name recorded INSIDE it
            # is lisplens-<tag>-<target>.tar.gz.
            archive="lisplens-$tag-$t.tar.gz"
            f="lisplens-$tag-$t.sha256"
            gh release download "$tag" --repo "$repo" --pattern "$f" --dir . --clobber
            # Pick the line for THIS archive by name rather than assuming the
            # file holds exactly one: the action hashes every asset it uploads
            # for the target into a single sidecar, so adding e.g. `tar-xz` to
            # the binaries job would silently make `awk '{print $1}'` ambiguous.
            # `shasum` may also prefix the name with `*` (binary mode).
            sha="$(awk -v a="$archive" '$2 == a || $2 == "*" a { print $1; exit }' "$f")"
            # A formula is only as good as these digests, and the sidecar's name
            # and format come from a third-party action. Assert the shape rather
            # than baking whatever was read into a formula users will install.
            if ! printf '%s' "$sha" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "::error::$f did not yield a sha256 digest for $archive (got '${sha}') — the sidecar naming or format changed upstream"
              exit 1
            fi
            sed_args+=(-e "s|@${targets[$t]}@|$sha|g")
          done

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/rigortype/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed "${sed_args[@]}" .github/homebrew/lisplens.rb.tmpl > tap/Formula/lisplens.rb

          # Never ship an unfilled placeholder — a formula with a literal
          # @SHA_...@ would fail `brew install` at integrity verification.
          if grep -q '@[A-Z_]*@' tap/Formula/lisplens.rb; then
            echo "::error::a placeholder survived substitution in the generated formula"
            grep -n '@[A-Z_]*@' tap/Formula/lisplens.rb
            exit 1
          fi
          ruby -c tap/Formula/lisplens.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lisplens.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for $version"
          else
            git commit -m "lisplens $version"
            git push
          fi
