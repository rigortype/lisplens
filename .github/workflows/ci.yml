name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Snapshot size
        # docs/CURRENT_WORKS.md is one ephemeral handoff, replaced each time
        # (contract in its header). Hand-compression does not hold on its own —
        # an earlier revision grew to 656 lines of restated history — so the
        # cap is mechanical. If this fails, move durable content to the dev
        # docs and work items to the issue tracker; do not raise the cap.
        run: |
          lines=$(wc -l < docs/CURRENT_WORKS.md)
          if [ "$lines" -gt 120 ]; then
            echo "::error::docs/CURRENT_WORKS.md is $lines lines (cap 120) — it is a replaceable handoff, not an archive. Durable knowledge goes to docs/dev + CHANGELOG; backlog goes to GitHub issues."
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Install cargo-about + cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about,cargo-deny
      - name: License audit
        # Fail if any dependency uses a license outside deny.toml's allow list —
        # so a new dep under an unexpected (e.g. copyleft) license can't slip in.
        run: cargo deny check licenses
      - name: Third-party licenses up to date
        # The embedded THIRD-PARTY-LICENSES.md must match the current dependency
        # tree — a binary-only distribution relies on it for its deps' notices.
        # Regenerate with cargo-about and fail if it drifted (deps changed without
        # `cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md`).
        run: |
          cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md
          git diff --exit-code -- THIRD-PARTY-LICENSES.md \
            || { echo "::error::THIRD-PARTY-LICENSES.md is stale — run: cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md"; exit 1; }
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Package (dry run)
        run: cargo publish --dry-run
