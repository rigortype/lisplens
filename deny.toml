# cargo-deny configuration — the license audit run in CI as `cargo deny check
# licenses`. It fails if any dependency's license is outside `allow`, so a new
# dependency under an unexpected (e.g. copyleft) license can't slip in unnoticed.
# The bundled notices themselves are generated separately by `cargo about`.

# Audit the union of the published-binary platforms (same set as about.toml), so a
# license used only on, say, Windows is still covered.
[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[licenses]
# Licenses accepted for lisplens and every dependency. Keep this in sync with
# `about.toml`'s `accepted`. Add a license here only after confirming it is
# compatible with shipping a permissively-distributed binary.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unlicense",
    "BSL-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.9
